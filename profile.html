<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <title>EveryDayEng — Profile</title>
</head>
<body class="bg-gradient-to-r from-cyan-500 to-blue-500 min-h-screen">

<header class="container mx-auto py-10">
  <div class="font-bold text-5xl text-sky-50 text-center">EveryDay English</div>
</header>

<div class="flex flex-col md:flex-row mt-12 px-4 md:px-8 gap-8 items-center md:items-start">

  <!-- Navigation -->
  <nav>
    <div id="nav-links" class="flex flex-row flex-wrap justify-center md:flex-col gap-4">
      <a href="./app.html"      class="nav-link">Start</a>
      <a href="./register.html" class="nav-link">Register</a>
      <a href="./login.html"    class="nav-link">Login</a>
      <a href="./profile.html"  class="nav-link">Profile</a>
      <a href="./index.html"    class="nav-link">About us</a>
    </div>
  </nav>

  <main class="flex-1 text-center w-full">
    <div class="max-w-md mx-auto mt-4 bg-white/95 shadow-xl rounded-3xl p-8 border-t-4 border-cyan-400">

      <!-- Avatar placeholder -->
      <div class="w-24 h-24 mx-auto mb-4 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-full flex items-center justify-center shadow-lg">
        <span class="text-white text-4xl font-bold" id="profile-avatar">?</span>
      </div>

      <h2 class="text-3xl font-bold text-cyan-800 mb-1" id="profile-name">—</h2>
      <p class="text-slate-500 text-sm mb-6" id="profile-email">—</p>

      <!-- Stats -->
      <div class="bg-cyan-50 rounded-2xl p-4 mb-6 border border-cyan-100">
        <p class="text-cyan-700 font-semibold text-lg" id="profile-stats">0 слів вивчено сьогодні</p>
      </div>

      <!-- Logout button -->
      <button id="btn-logout"
        class="w-full text-white text-xl font-bold bg-pink-400 py-3 rounded-xl hover:bg-pink-500 shadow-lg transform transition duration-300 hover:-translate-y-1">
        Log Out
      </button>

      <!-- Guest message (shown if not logged in) -->
      <div id="guest-message" class="hidden mt-4">
        <p class="text-slate-500">
          <a href="./login.html" class="text-cyan-600 font-bold hover:underline">Log in</a>
          to see your profile.
        </p>
      </div>

    </div>
  </main>
</div>

<footer class="text-center mt-20 mb-8 flex flex-col items-center gap-4">
  <img src="./logo.svg" alt="EveryDay English Logo" class="w-16 h-16 shadow-lg rounded-2xl transform transition hover:scale-110">
  <p class="text-white font-medium">If you have questions don't hesitate to contact</p>
  <p class="text-white font-medium">supercoolsitemaker@gmail.com</p>
</footer>

<style>
  .nav-link {
    display: block; width: 12rem; text-align: center;
    color: #1e40af; font-size: 1.5rem; background-color: #7dd3fc;
    padding: 0.5rem 1rem; border-radius: 9999px;
    transition: background-color 0.2s, transform 0.2s;
  }
  .nav-link:hover { background-color: #fbcfe8; transform: scale(1.1); }
</style>

<script type="module" src="js/main.js"></script>
</body>
</html>

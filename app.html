<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <title>EveryDayEng</title>
</head>
<body class="bg-gradient-to-r from-cyan-500 to-blue-500 min-h-screen">

<header class="container mx-auto py-10">
  <div class="font-bold text-5xl text-sky-50 text-center">EveryDay English</div>
</header>

<div class="flex flex-col md:flex-row mt-12 px-4 md:px-8 gap-8 items-center md:items-start">

  <nav>
    <div id="nav-links" class="flex flex-row flex-wrap justify-center md:flex-col gap-4">
      <a href="./app.html"      class="nav-link">Start</a>
      <a href="./register.html" class="nav-link">Register</a>
      <a href="./login.html"    class="nav-link">Login</a>
      <a href="./profile.html"  class="nav-link">Profile</a>
      <a href="./index.html"    class="nav-link">About us</a>
    </div>
  </nav>

  <main class="flex-1 w-full text-center">

    <!-- Mode tabs -->
    <div class="max-w-3xl mx-auto flex justify-end mb-6">
      <div class="flex bg-white/90 shadow-md p-1 rounded-xl">
        <button id="btn-learning"
          class="bg-white shadow-sm text-cyan-700 px-6 py-2 rounded-lg font-bold transition-all">
          Learning
        </button>
        <button id="btn-control"
          class="text-cyan-600 px-6 py-2 rounded-lg font-medium hover:text-cyan-800 transition-all">
          Control
        </button>
      </div>
    </div>

    <!-- Flashcard — click on card-body flips it in Control mode -->
    <div id="card-body"
      class="max-w-3xl mx-auto bg-white/95 shadow-2xl rounded-3xl p-8 md:p-12 border-t-4 border-cyan-400 relative select-none">

      <span id="card-category"
        class="absolute top-4 right-6 bg-pink-100 text-pink-600 px-4 py-1 rounded-full text-sm font-bold tracking-wide">
        Travel
      </span>

      <div class="mt-4">
        <h2 id="card-word"
          class="text-5xl md:text-6xl font-extrabold text-cyan-800 mb-2 tracking-tight">
          Destination
        </h2>
        <p id="card-transcription" class="text-xl text-slate-400 font-mono mb-6">
          [ˌdestɪˈneɪʃn]
        </p>

        <div id="card-flip-hint" class="hidden py-6">
          <p class="text-slate-400 text-lg italic">🔄 Tap the card to reveal the translation</p>
        </div>

        <div id="card-hideable">
          <hr class="w-20 mx-auto border-2 border-cyan-100 mb-6 rounded-full">
          <p id="card-translation" class="text-2xl md:text-3xl font-semibold text-slate-700 mb-6">
            Пункт призначення
          </p>
          <div class="bg-cyan-50 rounded-2xl p-5 text-left w-full md:w-4/5 mx-auto border-l-4 border-cyan-400 shadow-inner">
            <p id="card-example" class="text-slate-700 italic text-lg mb-1"></p>
            <p id="card-example-translation" class="text-slate-500 text-sm"></p>
          </div>
        </div>
      </div>

    </div><!-- /#card-body -->

    <!-- Action buttons -->
    <div class="max-w-3xl mx-auto flex flex-col md:flex-row gap-4 mt-4 justify-center">
      <button id="btn-needs-review"
        class="flex-1 bg-pink-50 text-pink-600 border-2 border-pink-200 font-bold text-xl py-3 rounded-xl hover:bg-pink-100 transition-colors">
        Needs Review ↺
      </button>
      <button id="btn-got-it"
        class="flex-1 bg-cyan-500 text-white font-bold text-xl py-3 rounded-xl shadow-lg hover:bg-cyan-600 hover:-translate-y-1 transform transition-all">
        Got It! ✓
      </button>
    </div>

    <!-- Progress bar  -->
    <div class="max-w-3xl mx-auto mt-8 px-2">
      <div class="flex justify-between text-sm font-bold text-sky-100 mb-2">
        <span>Daily Goal</span>
        <span id="progress-text">0 / 20 Words</span>
      </div>
      <div class="w-full bg-cyan-900/30 rounded-full h-3 overflow-hidden">
        <div id="progress-bar" class="bg-pink-400 h-3 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
    </div>

  </main>
</div>

<footer class="text-center mt-20 mb-8 flex flex-col items-center gap-4">
  <img src="./logo.svg" alt="EveryDay English Logo" class="w-16 h-16 shadow-lg rounded-2xl transform transition hover:scale-110">
  <p class="text-white font-medium">If you have questions don't hesitate to contact</p>
  <p class="text-white font-medium">supercoolsitemaker@gmail.com</p>
</footer>

<style>
  .nav-link {
    display: block; width: 12rem; text-align: center;
    color: #1e40af; font-size: 1.5rem; background-color: #7dd3fc;
    padding: 0.5rem 1rem; border-radius: 9999px;
    transition: background-color 0.2s, transform 0.2s;
  }
  .nav-link:hover { background-color: #fbcfe8; transform: scale(1.1); }
</style>

<script type="module" src="js/main.js"></script>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <title>EveryDayEng — Register</title>
</head>
<body class="bg-gradient-to-r from-cyan-500 to-blue-500 min-h-screen">

<header class="container mx-auto py-10">
  <div class="font-bold text-5xl text-sky-50 text-center">EveryDay English</div>
</header>

<div class="flex flex-col md:flex-row mt-12 px-4 md:px-8 gap-8 items-center md:items-start">

  <!-- Navigation -->
  <nav>
    <div id="nav-links" class="flex flex-row flex-wrap justify-center md:flex-col gap-4">
      <a href="./app.html"      class="nav-link">Start</a>
      <a href="./register.html" class="nav-link">Register</a>
      <a href="./login.html"    class="nav-link">Login</a>
      <a href="./profile.html"  class="nav-link">Profile</a>
      <a href="./index.html"    class="nav-link">About us</a>
    </div>
  </nav>

  <main class="flex-1 text-center w-full">
    <div class="max-w-md mx-auto mt-4 bg-white/95 shadow-xl rounded-3xl p-8 border-t-4 border-cyan-400">
      <h2 class="text-3xl font-bold text-cyan-600 mb-6 text-center">Create Account</h2>

      <!-- Error message -->
      <div id="register-error"
        class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 rounded-xl text-sm font-semibold">
      </div>

      <form id="register-form" class="flex flex-col gap-4">
        <div>
          <label class="block text-left text-sm font-semibold text-slate-700 mb-1">Name</label>
          <input id="register-name" type="text" placeholder="Jane Smith" required
            class="w-full px-4 py-2 border-2 border-cyan-200 rounded-xl focus:outline-none focus:border-cyan-500 bg-cyan-50 text-slate-700 transition-colors">
        </div>
        <div>
          <label class="block text-left text-sm font-semibold text-slate-700 mb-1">Email</label>
          <input id="register-email" type="email" placeholder="jane.smith@example.com" required
            class="w-full px-4 py-2 border-2 border-cyan-200 rounded-xl focus:outline-none focus:border-cyan-500 bg-cyan-50 text-slate-700 transition-colors">
        </div>
        <div>
          <label class="block text-left text-sm font-semibold text-slate-700 mb-1">Password</label>
          <input id="register-password" type="password" placeholder="Min. 6 characters" required
            class="w-full px-4 py-2 border-2 border-cyan-200 rounded-xl focus:outline-none focus:border-cyan-500 bg-cyan-50 text-slate-700 transition-colors">
        </div>
        <button type="submit"
          class="w-full mt-4 text-center text-white text-xl font-bold bg-cyan-500 py-3 rounded-xl hover:bg-cyan-600 shadow-lg transform transition duration-300 hover:-translate-y-1">
          Sign Up
        </button>
        <p class="mt-4 text-slate-600">
          Already have an account?
          <a href="login.html" class="text-cyan-600 font-bold hover:underline">Log in</a>
        </p>
      </form>
    </div>
  </main>
</div>

<footer class="text-center mt-20 mb-8 flex flex-col items-center gap-4">
  <img src="./logo.svg" alt="EveryDay English Logo" class="w-16 h-16 shadow-lg rounded-2xl transform transition hover:scale-110">
  <p class="text-white font-medium">If you have questions don't hesitate to contact</p>
  <p class="text-white font-medium">supercoolsitemaker@gmail.com</p>
</footer>

<style>
  .nav-link {
    display: block; width: 12rem; text-align: center;
    color: #1e40af; font-size: 1.5rem; background-color: #7dd3fc;
    padding: 0.5rem 1rem; border-radius: 9999px;
    transition: background-color 0.2s, transform 0.2s;
  }
  .nav-link:hover { background-color: #fbcfe8; transform: scale(1.1); }
</style>

<script type="module" src="js/main.js"></script>
</body>
</html>
